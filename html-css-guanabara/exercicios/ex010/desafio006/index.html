<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 006</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul type="square">
        <li title="Podemos usar a tag p">Parágrafo</li>
        <li title="Podemos usar a tag h1...h6">Cabeçalho</li>
        <li title="Podemos usar a tag b">Negrito</li>
        <li title="Podemos usar a tag a">Hiperlink</li>
        <li title="Podemos usar a tag img">Imagem</li>
        <li title="Podemos usar a tag ol">Lista ordenada</li>
        <li title="Podemos usar a tag ul">Lista-não-ordenada</li>
        <li title="Podemos usar a tag li">Item da lista</li>
    </ul>
</body>
</html>
