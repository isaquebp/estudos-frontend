<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos</h1>
    <hr>
    <p>Você pode escrever um parágrafo de qualquer jeito, basta colocar tudo em um par de tags</p>
    <p>Se precisar quebrar o texto em algum lugar em específico como esse, você pode usar a tag &lt;br&gt;.</p> <!-- LESS THAN / GREATER THAN-->
    <p>Vamos adicionar alguns símbolos especiais:
        &reg;
        &copy;
        &trade;
        &pound;
        &yen;
        &cent;
        &Delta; 
        &uarr;
    </p>

    <p>Vamos adicionar alguns emojis:
        &#x1F47A;
    </p>
</body>
</html>
