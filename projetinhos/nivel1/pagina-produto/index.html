<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria del isaque</title>
</head>
<body>
    <h1>Del isaque La Pizzaria</h1>
    <form action="#">
        <fieldset>
            <legend>Qual pizza você quer?</legend>
            <input type="checkbox" name="frango" id="frango">
            <label for="frango">Frango</label><br>
            <input type="checkbox" name="carne" id="carne">
            <label for="carne">Carne</label><br>
            <input type="checkbox" name="calabresa" id="calabresa">
            <label for="calabresa">Calabresa</label><br>
            <input type="checkbox" name="portuguesa" id="portuguesa">
            <label for="portuguesa">Portuguesa</label>
        </fieldset>

        <fieldset>
            <legend>Qual bebida você quer?</legend>
            <input type="checkbox" name="cocacola" id="cocacola">
            <label for="cocacola">Coca-Cola 2L</label><br>
            <input type="checkbox" name="guarana" id="guarana">
            <label for="guarana">Guaraná 2L</label><br>
            <input type="checkbox" name="pepsi" id="pepsi">
            <label for="pepsi">Pepsi 2L</label><br>
        </fieldset>
        <label for="endereco">Qual o seu endereço?</label><br>
        <input type="text" name="endereco" id="endereco">

        <br><br>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
